on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix: >
        {
          "include": [
            {
              "board": "glove80_lh",
              "snippet": "studio-rpc-usb-uart",
              "cmake-args": "-DCONFIG_ZMK_STUDIO=y"
            },
            {
              "board": "glove80_rh"
            }
          ]
        }
